<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>1000 Piece Grand Canyon Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Special+Elite&family=VT323&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <header class="hero">
    <img class="hero-photo" src="./img/hero-friends.jpg" alt="" loading="eager" />
    <div class="grain"></div>
    <div class="hero-inner">
      <h1>1000 piece grand canyon puzzle</h1>
      <p class="subtitle">tacos and thai food</p>
      <p class="when">day tbd &middot; time tbd</p>
    </div>
  </header>

  <main>

    <section class="cards-only">
      <article class="card placeholder"><div class="ph-frame"></div><div class="card-tape"></div></article>
      <article class="card placeholder"><div class="ph-frame"></div><div class="card-tape"></div></article>
      <article class="card placeholder"><div class="ph-frame"></div><div class="card-tape"></div></article>
      <article class="card placeholder"><div class="ph-frame"></div><div class="card-tape"></div></article>
    </section>

    <section class="strip-grid">
      <figure class="poly p1"><div class="ph-frame ph-tall"></div></figure>
      <figure class="poly p2"><div class="ph-frame ph-tall"></div></figure>
      <figure class="poly p3"><div class="ph-frame ph-tall"></div></figure>
      <figure class="poly p4"><div class="ph-frame ph-tall"></div></figure>
      <figure class="poly poly-empty"><div class="ph-frame ph-tall"></div></figure>
      <figure class="poly poly-empty"><div class="ph-frame ph-tall"></div></figure>
    </section>

    <section class="jar-section">
      <div class="jar">
        <div class="jar-glass">
          <div class="coin c1"></div>
          <div class="coin c2"></div>
          <div class="coin c3"></div>
          <div class="coin c4"></div>
          <div class="coin c5"></div>
        </div>
      </div>
    </section>

    <section class="closer" style="background-image: url('./img/green-mountains.jpg');">
      <div class="grain"></div>
      <canvas id="stars"></canvas>
    </section>

  </main>

  <script src="./app.js"></script>
</body>
</html>
